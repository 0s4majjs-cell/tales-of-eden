<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Tale of Alexander Colt – Reader</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="reader-body">
  <div class="reader-shell">
    <header class="reader-top">
      <a href="../../index.html">← Library</a>
      <span>The Tale of Alexander Colt</span>
      <a href="index.html">Book Info →</a>
    </header>

    <main class="reader-main">
      <section class="spread" id="spread-container">
        <!-- pages injected here -->
      </section>
    </main>

    <footer class="reader-bottom">
      <button class="reader-btn" type="button" onclick="location.href='index.html'">Cover</button>

      <div class="reader-pager">
        <button class="pager-btn" id="prevBtn" type="button" onclick="changeSpread(-1)">&lt;</button>
        <span id="pageIndicator">Page 1–1 | 1</span>
        <button class="pager-btn" id="nextBtn" type="button" onclick="changeSpread(1)">&gt;</button>
      </div>

      <button class="reader-btn" type="button" id="bookmarkBtn">Bookmark</button>
    </footer>
  </div>

  <script>
    /* ===== Theme + settings applied in reader too ===== */
    (function() {
      const THEME_KEY = "toe_theme";
      const SETTINGS_KEY = "toe_settings";

      const defaultTheme = {
        presetId: "eden",
        accent: "#4ea1ff",
        bgMainTop: "#182538",
        bgMainBottom: "#05060a",
        sidebarTop: "#1b252f",
        sidebarBottom: "#05070b",
        cardTop: "#0d1420",
        cardBottom: "#05070c",
        readerPage: "#08121e",
        textMain: "#e9f1ff",
        textMuted: "#9aa4c3",
        bgStyle: "nebula",
        readerFont: "serif",
        readerFontSize: "normal",
      };

      const defaultSettings = {
        animationsEnabled: true,
        reducedEffects: false,
      };

      function load(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return { ...fallback };
          const parsed = JSON.parse(raw);
          return { ...fallback, ...parsed };
        } catch {
          return { ...fallback };
        }
      }

      const theme = load(THEME_KEY, defaultTheme);
      const settings = load(SETTINGS_KEY, defaultSettings);

      const root = document.documentElement;

      root.style.setProperty("--color-accent", theme.accent);
      root.style.setProperty("--color-bg-main-top", theme.bgMainTop);
      root.style.setProperty("--color-bg-main-bottom", theme.bgMainBottom);
      root.style.setProperty("--color-bg-sidebar-top", theme.sidebarTop);
      root.style.setProperty("--color-bg-sidebar-bottom", theme.sidebarBottom);
      root.style.setProperty("--color-card-top", theme.cardTop);
      root.style.setProperty("--color-card-bottom", theme.cardBottom);
      root.style.setProperty("--color-reader-page", theme.readerPage);
      root.style.setProperty("--color-text-main", theme.textMain);
      root.style.setProperty("--color-text-muted", theme.textMuted);

      root.setAttribute("data-bg-style", theme.bgStyle || "nebula");

      let fontStack;
      if (theme.readerFont === "mono") {
        fontStack = '"JetBrains Mono", "Cascadia Code", monospace';
      } else if (theme.readerFont === "sans") {
        fontStack = 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      } else {
        fontStack = '"Georgia", "Times New Roman", serif';
      }
      root.style.setProperty("--font-reader", fontStack);

      let sizeRem = "0.98rem";
      if (theme.readerFontSize === "small") sizeRem = "0.9rem";
      if (theme.readerFontSize === "large") sizeRem = "1.08rem";
      root.style.setProperty("--reader-font-size", sizeRem);

      document.body.classList.toggle("no-animations", !settings.animationsEnabled);
      document.body.classList.toggle("reduced-effects", !!settings.reducedEffects);
    })();
  </script>

  <script>
    const BOOK_ID = "Alexander";
    const STORAGE_KEY = `bookmarks_${BOOK_ID}`;

    let TOTAL_PAGES = 1;
    let currentLeft = 1;

    // -------- URL page param helpers --------
    function getPageParam() {
      const params = new URLSearchParams(window.location.search);
      const p = parseInt(params.get('page'), 10);
      return (!isNaN(p) && p >= 1) ? p : 1;
    }

    function clampToValidLeft(page) {
      let left = page;

      if (left < 1) left = 1;
      if (left > TOTAL_PAGES) left = TOTAL_PAGES;

      // Make sure left page is odd when there could be a right page
      if (TOTAL_PAGES > 1 && left % 2 === 0) {
        left -= 1;
      }
      if (left < 1) left = 1;

      return left;
    }

    // -------- Fetch page HTML --------
    function fetchPage(n) {
      if (n > TOTAL_PAGES) {
        return Promise.resolve('<article class="page-column"></article>');
      }
      return fetch(`pages/page${n}.html`)
        .then(res => {
          if (!res.ok) throw new Error("not found");
          return res.text();
        })
        .catch(() =>
          `<article class="page-column"><p style="color:#f88">Page ${n} not found.</p></article>`
        );
    }

    // -------- Load spread: 2 pages if possible, else 1 centered --------
    function loadSpread(leftPage) {
      const container = document.getElementById('spread-container');
      container.innerHTML = '';

      const rightPage = leftPage + 1;

      if (rightPage > TOTAL_PAGES) {
        // Single page
        container.classList.add('single-page');
        fetchPage(leftPage).then(leftHtml => {
          container.innerHTML = leftHtml;
          currentLeft = leftPage;
          updateControls();
        });
      } else {
        // Two pages
        container.classList.remove('single-page');
        Promise.all([fetchPage(leftPage), fetchPage(rightPage)]).then(([leftHtml, rightHtml]) => {
          container.innerHTML = leftHtml + rightHtml;
          currentLeft = leftPage;
          updateControls();
        });
      }
    }

    // -------- Pager controls --------
    function updateControls() {
      const pageIndicator = document.getElementById('pageIndicator');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      const left = currentLeft;
      const right = Math.min(currentLeft + 1, TOTAL_PAGES);
      pageIndicator.textContent = `Page ${left}–${right} | ${TOTAL_PAGES}`;

      const lastLeft = (TOTAL_PAGES % 2 === 0) ? TOTAL_PAGES - 1 : TOTAL_PAGES;
      prevBtn.disabled = left <= 1;
      nextBtn.disabled = left >= lastLeft;
    }

    function changeSpread(direction) {
      const lastLeft = (TOTAL_PAGES % 2 === 0) ? TOTAL_PAGES - 1 : TOTAL_PAGES;
      let newLeft = currentLeft + direction * 2;

      if (newLeft < 1) newLeft = 1;
      if (newLeft > lastLeft) newLeft = lastLeft;
      if (newLeft === currentLeft) return;

      const params = new URLSearchParams(window.location.search);
      params.set('page', newLeft);
      history.replaceState(null, '', '?' + params.toString());

      loadSpread(newLeft);
    }

    // -------- Bookmarks --------
    function loadBookmarks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveBookmarks(bms) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bms));
    }

    function addBookmarkForCurrentPage() {
      const page = currentLeft;
      if (!page || isNaN(page)) return;

      const label = window.prompt("Bookmark label (optional):", "") || "";
      let bookmarks = loadBookmarks();

      if (bookmarks.some(b => b.page === page)) {
        const overwrite = window.confirm(
          `Page ${page} is already bookmarked. Replace its label?`
        );
        if (overwrite) {
          bookmarks = bookmarks.map(b =>
            b.page === page ? { label, page } : b
          );
        } else {
          return;
        }
      } else {
        bookmarks.push({ label, page });
      }

      saveBookmarks(bookmarks);
      alert(`Bookmarked page ${page}${label ? ` (${label})` : ""}.`);
    }

    // -------- Init --------
    document.addEventListener('DOMContentLoaded', () => {
      // Load total pages from books.json
      fetch("../../books.json")
        .then(res => res.ok ? res.json() : [])
        .then(data => {
          const meta = data.find(b => b.id === BOOK_ID);
          if (meta && typeof meta.totalPages === "number" && meta.totalPages > 0) {
            TOTAL_PAGES = meta.totalPages;
          } else {
            TOTAL_PAGES = 1;
          }

          currentLeft = clampToValidLeft(getPageParam());
          loadSpread(currentLeft);
        })
        .catch(() => {
          TOTAL_PAGES = 1;
          currentLeft = 1;
          loadSpread(currentLeft);
        });

      // Bookmark button
      document
        .getElementById("bookmarkBtn")
        .addEventListener("click", addBookmarkForCurrentPage);

      // Arrow key navigation
      document.addEventListener("keydown", (event) => {
        const tag = (event.target && event.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA") return;

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          changeSpread(-1);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          changeSpread(1);
        }
      });
    });
  </script>
</body>
</html>
